<!doctype html>
<html lang="az">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DIALAB Klinika - Laboratoriya və Diaqnostika Mərkəzi</title>
    <meta name="description" content="DIALAB Tibb Mərkəzi - Müasir laboratoriya testləri və diaqnostika xidmətləri. 500+ növ test, peşəkar həkimlər, etibarlı nəticələr." />
    <meta name="keywords" content="laboratoriya, diaqnostika, tibb mərkəzi, qan analizi, USM, Bakı, DIALAB" />
    
    <!-- Google Fonts - Manrope & Source Sans 3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/dia_logo_symbol.png" />
    
    <style>
      /* Critical CSS for above-the-fold content */
      body {
        font-family: 'Manrope', sans-serif;
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #0f1012;
        overflow-x: hidden;
      }
      
      /* Smooth scroll behavior */
      html {
        scroll-behavior: smooth;
      }
      
      /* Prevent FOUC */
      .no-js {
        visibility: hidden;
      }
      
      /* Loading state */
      #root:empty::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border: 3px solid #e6f7f2;
        border-top-color: #00b982;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
